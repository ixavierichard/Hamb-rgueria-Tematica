<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combos - Bob's Burger</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

<header class="topo">
  <h1>🍔 Combos da Fenda do Biquíni</h1>
  <p>Os melhores combos do fundo do mar!</p>
</header>

<section class="combos">

  <div class="card">
    <img src="./img/combo-bob.png" alt="Combo Bob Esponja">
    <h2>Combo Bob</h2>
    <p>1 Krabby Burger + Batata + Refrigerante</p>
    <span>R$ 29,90</span>
    <button>Pedir agora</button>
  </div>

  <div class="card">
    <img src="./img/combo-patrick.png" alt="Combo Patrick">
    <h2>Combo Patrick</h2>
    <p>2 Burgers + Batata grande + Milkshake</p>
    <span>R$ 39,90</span>
    <button>Pedir agora</button>
  </div>

  <div class="card">
    <img src="./img/combo-squid.png" alt="Combo Lula Molusco">
    <h2>Combo Lula Molusco</h2>
    <p>Hambúrguer gourmet + Batata rústica + Chá gelado</p>
    <span>R$ 34,90</span>
    <button>Pedir agora</button>
  </div>

</section>

</body>
</html>
